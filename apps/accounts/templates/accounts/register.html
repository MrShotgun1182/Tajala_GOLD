{% extends 'core/base.html' %}
{% load static %}

{% block title %}ثبت نام در تجلا گلد{% endblock %}

{% block content %}
<div class="min-h-dvh flex items-center justify-center bg-slate-50 text-slate-800 relative overflow-hidden p-4 overflow-x-hidden animate-fadeIn">
    
    <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-amber-500/5 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-teal-500/5 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md z-10 space-y-6">
        
        <div class="text-center space-y-2">
            <div class="inline-flex w-14 h-14 rounded-2xl bg-gradient-to-br from-amber-400 to-amber-600 items-center justify-center shadow-lg shadow-amber-500/20 mb-2">
                <svg class="w-8 h-8 text-slate-950" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">تجلا گلد</h1>
            <p class="text-slate-400 text-xs font-medium">درخشش اصالت، امنیت دارایی</p>
        </div>

        <div class="bg-white/80 backdrop-blur-xl border border-slate-200/80 p-8 rounded-3xl shadow-xl shadow-slate-100">
            <h2 class="text-lg font-black text-slate-700 mb-6 text-right">ایجاد حساب کاربری</h2>
            
            <form method="post" class="space-y-4">
                {% csrf_token %}
                
                <div class="space-y-1.5 text-right">
                    <label class="block text-slate-500 text-xs font-bold">نام و نام خانوادگی</label>
                    <input type="text" name="full_name" required
                        class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 text-xs text-slate-800 focus:outline-none focus:border-amber-500 focus:bg-white transition-all text-right placeholder-slate-400 shadow-inner"
                        placeholder="علیرضا احمدی">
                </div>

                <div class="space-y-1.5 text-right">
                    <label class="block text-slate-500 text-xs font-bold">شماره همراه</label>
                    <input type="text" name="phone_number" required
                        class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 text-xs text-slate-800 focus:outline-none focus:border-amber-500 focus:bg-white transition-all text-right placeholder-slate-400 shadow-inner placeholder:text-left"
                        placeholder="0912*******">
                </div>

                <div class="space-y-1.5 text-right">
                    <label class="block text-slate-500 text-xs font-bold">رمز عبور</label>
                    <input type="password" name="password" required
                        class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 text-xs text-slate-800 focus:outline-none focus:border-amber-500 focus:bg-white transition-all text-right placeholder-slate-400 shadow-inner"
                        placeholder="********">
                </div>

                <div class="flex items-start gap-2 justify-end text-xs font-bold mt-2 pt-1">
                    <label for="terms" class="text-slate-400 font-medium cursor-pointer select-none text-right leading-normal">
                        <a href="#" class="text-amber-700 hover:underline">قوانین و مقررات</a> پلتفرم تجلا گلد را مطالعه کرده و می‌پذیرم.
                    </label>
                    <input type="checkbox" id="terms" required class="w-4 h-4 rounded border-slate-300 text-amber-600 focus:ring-amber-500 accent-amber-500 cursor-pointer mt-0.5">
                </div>

                <button type="submit" 
                    class="w-full h-12 bg-gradient-to-br from-amber-400 to-amber-600 text-slate-950 font-black rounded-xl transition-all shadow-md shadow-amber-500/10 hover:opacity-95 active:scale-[0.98] text-xs flex items-center justify-center gap-2 mt-2">
                    ساخت حساب کاربری
                </button>
            </form>

            <div class="mt-6 pt-5 border-t border-slate-100 text-center text-xs">
                <p class="text-slate-400 font-medium">
                    قبلاً ثبت‌نام کرده‌اید؟ 
                    <a href="#" class="text-amber-700 font-black hover:underline mr-1">وارد شوید</a>
                </p>
            </div>
        </div>

        <p class="text-center text-slate-400 text-[10px] font-medium font-mono">
            &copy; 2026 Tajala Gold. All Rights Reserved.
        </p>
    </div>
</div>
{% endblock %}
