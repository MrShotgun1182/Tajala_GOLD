{% extends 'core/base.html' %}
{% load static %}

{% block title %}ورود به تجلا گلد{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-primary-800 relative overflow-hidden p-4">
    <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-secondary-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-primary-500/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md z-10">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold text-secondary-500 mb-2 tracking-tight">تجلا گلد</h1>
            <p class="text-surface-400 text-lg">درخشش اصالت، امنیت دارایی</p>
        </div>

        <div class="bg-primary-900/40 backdrop-blur-xl border border-surface-800 p-8 rounded-3xl shadow-2xl">
            <h2 class="text-2xl font-semibold text-white mb-6 text-right">خوش آمدید</h2>
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-surface-300 mb-2 text-right text-sm">شماره همراه یا نام کاربری</label>
                    <input type="text" name="username" required
                        class="w-full bg-primary-950/50 border border-surface-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-secondary-500 transition-all text-right placeholder-surface-600"
                        placeholder="0912*******">
                </div>

                <div>
                    <label class="block text-surface-300 mb-2 text-right text-sm">رمز عبور</label>
                    <input type="password" name="password" required
                        class="w-full bg-primary-950/50 border border-surface-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-secondary-500 transition-all text-right placeholder-surface-600"
                        placeholder="********">
                </div>

                <div class="flex items-center justify-between text-sm">
                    <a href="#" class="text-secondary-400 hover:text-secondary-300 transition-colors">فراموشی رمز عبور؟</a>
                    <div class="flex items-center gap-2">
                        <label for="remember" class="text-surface-400">مرا به خاطر بسپار</label>
                        <input type="checkbox" id="remember" class="accent-secondary-500">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-secondary-500 hover:bg-secondary-600 text-primary-950 font-bold py-4 rounded-xl transition-all shadow-lg shadow-secondary-500/20 active:scale-95">
                    ورود به حساب کاربری
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-surface-800 text-center">
                <p class="text-surface-400">
                    هنوز عضو نشده‌اید؟ 
                    <a href="#" class="text-secondary-400 font-bold hover:underline">ثبت نام کنید</a>
                </p>
            </div>
        </div>

        <p class="text-center text-surface-600 text-xs mt-8">
            &copy; 2024 Tajala Gold. تمامی حقوق محفوظ است.
        </p>
    </div>
</div>
{% endblock %}
